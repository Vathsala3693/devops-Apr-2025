---
# Pre-check: OS (allow Amazon Linux also)
- name: Fail if not supported OS
  fail:
    msg: "Only RedHat/Amazon Linux supported"
  when: ansible_os_family != "RedHat"

# Pre-check: Port
- name: Check port usage
  shell: ss -tuln | grep ":{{ tomcat_port }}"
  register: port_check
  ignore_errors: yes

- name: Stop if port in use
  fail:
    msg: "Port already in use"
  when: port_check.rc == 0

# Install Java (Amazon Linux fix)
- name: Install Java
  yum:
    name: java-11-amazon-corretto
    state: present

# Download Tomcat
- name: Download Tomcat
  get_url:
    url: "https://archive.apache.org/dist/tomcat/tomcat-9/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
    dest: /tmp/tomcat.tar.gz

# Extract
- name: Extract Tomcat
  unarchive:
    src: /tmp/tomcat.tar.gz
    dest: /opt/
    remote_src: yes

# Start Tomcat
- name: Start Tomcat
  shell: "/opt/apache-tomcat-{{ tomcat_version }}/bin/startup.sh"